<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목표 & 습관 트래커</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 24px 16px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 6px 18px; border-radius: 20px; border: 0.5px solid #ddd; background: transparent; cursor: pointer; font-size: 14px; }
  .tab.active { background: #eee; border-color: #999; font-weight: 500; }
  .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 16px 20px; margin-bottom: 14px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .habit-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .streak { font-size: 12px; background: #FEF3C7; color: #92400E; padding: 2px 8px; border-radius: 10px; }
  .days { display: flex; gap: 6px; }
  .day-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 2px; border-radius: 8px; border: 0.5px solid #e0e0e0; background: #f5f5f3; cursor: pointer; transition: background 0.15s; }
  .day-btn.checked { color: #fff; }
  .day-btn.today { border-width: 1.5px; }
  .day-btn.future { opacity: 0.4; cursor: default; }
  .day-label { font-size: 11px; }
  .day-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
  .check-mark { font-size: 11px; color: #fff; }
  .del-btn { background: none; border: none; cursor: pointer; color: #bbb; font-size: 18px; line-height: 1; }
  .progress-bar-bg { height: 6px; background: #eee; border-radius: 4px; margin-bottom: 10px; }
  .progress-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .goal-meta { font-size: 13px; color: #888; margin-top: 2px; }
  .step-btns { display: flex; gap: 8px; }
  .step-btn { padding: 4px 14px; border-radius: 8px; border: 0.5px solid #e0e0e0; background: #f5f5f3; cursor: pointer; font-size: 14px; }
  .add-box { background: #f5f5f3; border-radius: 12px; padding: 16px 20px; }
  .add-label { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
  input[type=text], input[type=number] { padding: 7px 10px; border-radius: 8px; border: 0.5px solid #e0e0e0; font-size: 14px; background: #fff; color: #1a1a1a; }
  input[type=text] { flex: 1; }
  input[type=color] { width: 36px; height: 36px; border: none; border-radius: 8px; cursor: pointer; background: none; padding: 0; }
  .add-btn { padding: 7px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; cursor: pointer; font-size: 14px; white-space: nowrap; }
  .export-btn { padding: 5px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; cursor: pointer; font-size: 13px; }
  .modal-bg { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal { background:#fff; border-radius:12px; padding:24px; width:90%; max-width:480px; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .modal-title { font-weight:500; font-size:15px; }
  textarea { width:100%; height:180px; font-size:12px; font-family:monospace; border:0.5px solid #e0e0e0; border-radius:8px; padding:8px; background:#f5f5f3; resize:none; color:#1a1a1a; }
  .copy-btn { margin-top:10px; width:100%; padding:8px; border-radius:8px; border:0.5px solid #ccc; background:#f5f5f3; cursor:pointer; font-size:14px; }
  .done-text { text-decoration: line-through; opacity: 0.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div>
      <h1>목표 & 습관 트래커</h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <button class="export-btn" onclick="showCSV()">CSV 내보내기</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('habits',this)">습관</button>
    <button class="tab" onclick="switchTab('goals',this)">목표</button>
  </div>
  <div id="habits-panel"></div>
  <div id="goals-panel" style="display:none"></div>
</div>

<div id="csv-modal" class="modal-bg" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">CSV 데이터</span>
      <button class="del-btn" onclick="closeModal()">×</button>
    </div>
    <textarea id="csv-text" readonly></textarea>
    <button class="copy-btn" id="copy-btn" onclick="copyCSV()">클립보드에 복사</button>
  </div>
</div>

<script>
const DAYS = ["월","화","수","목","금","토","일"];
const today = new Date();
const todayIdx = today.getDay() === 0 ? 6 : today.getDay() - 1;

function getWeekKey() {
  const d = new Date();
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 1 - day);
  return d.toISOString().slice(0,10);
}
const weekKey = getWeekKey();

function load() {
  return {
    habits: JSON.parse(localStorage.getItem('habits') || 'null') || [
      { id:1, name:"물 8잔 마시기", color:"#3B82F6", checks:{} },
      { id:2, name:"30분 운동", color:"#10B981", checks:{} },
      { id:3, name:"독서 20분", color:"#8B5CF6", checks:{} }
    ],
    goals: JSON.parse(localStorage.getItem('goals') || 'null') || [
      { id:1, text:"책 5권 읽기", progress:2, total:5, done:false },
      { id:2, text:"영어 회화 수업 등록", progress:1, total:1, done:true }
    ]
  };
}
function save(data) {
  localStorage.setItem('habits', JSON.stringify(data.habits));
  localStorage.setItem('goals', JSON.stringify(data.goals));
}
let data = load();

function getStreak(h) {
  let s = 0;
  for (let i = todayIdx; i >= 0; i--) {
    if (h.checks[`${weekKey}-${i}`]) s++; else break;
  }
  return s;
}

function render() {
  const todayChecks = data.habits.filter(h => h.checks[`${weekKey}-${todayIdx}`]).length;
  const doneGoals = data.goals.filter(g => g.done).length;
  document.getElementById('subtitle').textContent = `오늘 습관 ${todayChecks}/${data.habits.length} · 목표 달성 ${doneGoals}/${data.goals.length}`;
  renderHabits();
  renderGoals();
}

function renderHabits() {
  const p = document.getElementById('habits-panel');
  let html = data.habits.map(h => {
    const streak = getStreak(h);
    const days = DAYS.map((d,i) => {
      const checked = !!h.checks[`${weekKey}-${i}`];
      const isToday = i === todayIdx;
      const future = i > todayIdx;
      const bg = checked ? h.color : '#f5f5f3';
      const border = isToday ? `border: 1.5px solid ${h.color}` : '';
      const cls = `day-btn${checked?' checked':''}${isToday?' today':''}${future?' future':''}`;
      const inner = checked ? `<span class="day-label" style="color:#fff">${d}</span><span class="check-mark">✓</span>`
                            : `<span class="day-label">${d}</span><div class="day-dot"></div>`;
      return `<button class="${cls}" style="background:${bg};${border}" onclick="${future?'':`toggleHabit(${h.id},${i})`}">${inner}</button>`;
    }).join('');
    return `<div class="card">
      <div class="card-header">
        <div class="habit-name"><span class="dot" style="background:${h.color}"></span>${h.name}${streak>0?`<span class="streak">🔥 ${streak}일</span>`:''}</div>
        <button class="del-btn" onclick="removeHabit(${h.id})">×</button>
      </div>
      <div class="days">${days}</div>
    </div>`;
  }).join('');
  html += `<div class="add-box"><div class="add-label">새 습관 추가</div>
    <div class="add-row">
      <input type="text" id="new-habit" placeholder="습관 이름" onkeydown="if(event.key==='Enter')addHabit()">
      <input type="color" id="new-habit-color" value="#3B82F6">
      <button class="add-btn" onclick="addHabit()">추가</button>
    </div>
  </div>`;
  p.innerHTML = html;
}

function renderGoals() {
  const p = document.getElementById('goals-panel');
  let html = data.goals.map(g => {
    const pct = Math.round((g.progress/g.total)*100);
    const barColor = g.done ? '#10B981' : '#6366F1';
    return `<div class="card" style="${g.done?'opacity:0.75':''}">
      <div class="card-header">
        <div>
          <div class="${g.done?'done-text':''}" style="font-size:15px;font-weight:500">${g.text}</div>
          <div class="goal-meta">${g.progress} / ${g.total}${g.done?' ✓ 완료!':''}</div>
        </div>
        <button class="del-btn" onclick="removeGoal(${g.id})">×</button>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%;background:${barColor}"></div></div>
      ${!g.done?`<div class="step-btns"><button class="step-btn" onclick="updateProgress(${g.id},-1)">−</button><button class="step-btn" onclick="updateProgress(${g.id},1)">+</button></div>`:''}
    </div>`;
  }).join('');
  html += `<div class="add-box"><div class="add-label">새 목표 추가</div>
    <div class="add-row"><input type="text" id="new-goal" placeholder="목표 입력" onkeydown="if(event.key==='Enter')addGoal()"></div>
    <div class="add-row">
      <label style="font-size:13px;color:#888;white-space:nowrap;align-self:center">목표 단계 수</label>
      <input type="number" id="new-goal-total" value="1" min="1" max="100" style="width:70px">
      <button class="add-btn" onclick="addGoal()">추가</button>
    </div>
  </div>`;
  p.innerHTML = html;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('habits-panel').style.display = tab==='habits'?'':'none';
  document.getElementById('goals-panel').style.display = tab==='goals'?'':'none';
}

function toggleHabit(id, dayIdx) {
  const h = data.habits.find(x => x.id===id);
  const k = `${weekKey}-${dayIdx}`;
  h.checks[k] = !h.checks[k];
  save(data); render();
}
function removeHabit(id) { data.habits = data.habits.filter(h => h.id!==id); save(data); render(); }
function addHabit() {
  const name = document.getElementById('new-habit').value.trim();
  const color = document.getElementById('new-habit-color').value;
  if (!name) return;
  data.habits.push({ id: Date.now(), name, color, checks:{} });
  save(data); render();
}
function removeGoal(id) { data.goals = data.goals.filter(g => g.id!==id); save(data); render(); }
function updateProgress(id, delta) {
  const g = data.goals.find(x => x.id===id);
  g.progress = Math.max(0, Math.min(g.total, g.progress+delta));
  g.done = g.progress >= g.total;
  save(data); render();
}
function addGoal() {
  const text = document.getElementById('new-goal').value.trim();
  const total = parseInt(document.getElementById('new-goal-total').value) || 1;
  if (!text) return;
  data.goals.push({ id: Date.now(), text, progress:0, total, done:false });
  save(data); render();
}

function getCSVText() {
  const rows = [["유형","이름","월","화","수","목","금","토","일","스트릭","진행","목표","완료"]];
  data.habits.forEach(h => {
    const streak = getStreak(h);
    const dc = DAYS.map((_,i) => h.checks[`${weekKey}-${i}`]?"O":"");
    rows.push(["습관", h.name, ...dc, streak,"","",""]);
  });
  data.goals.forEach(g => {
    rows.push(["목표", g.text,"","","","","","","","",g.progress,g.total,g.done?"완료":"진행중"]);
  });
  return rows.map(r => r.join(",")).join("\n");
}
function showCSV() {
  document.getElementById('csv-text').value = getCSVText();
  document.getElementById('csv-modal').style.display = 'flex';
}
function closeModal() { document.getElementById('csv-modal').style.display = 'none'; }
function copyCSV() {
  navigator.clipboard.writeText(getCSVText()).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '복사됨 ✓';
    setTimeout(() => btn.textContent = '클립보드에 복사', 2000);
  });
}

render();
</script>
</body>
</html>
